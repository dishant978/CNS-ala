<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyanmanjari - macOS Aesthetic</title>
    
    <!-- Inter Font to closely resemble SF Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Apple Dark Mode Palette */
            --bg-grad-1: #0a0f1f;
            --bg-grad-2: #0f172a;
            --bg-grad-3: #1e293b;
            
            /* Typography */
            --text-main: #e2e8f0;
            --text-value: #f8fafc;
            --text-label: #94a3b8;
            
            /* UI Elements */
            --card-glass: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.12);
            --grid-glass: rgba(255, 255, 255, 0.04);
            --grid-border: rgba(255, 255, 255, 0.08);
            
            /* Smooth realistic shadows */
            --shadow-apple: 0 20px 40px rgba(0, 0, 0, 0.3), 0 4px 10px rgba(0, 0, 0, 0.1);
            
            /* Animations */
            --transition-apple: all 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Native Apple font stack prioritization */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            /* Smooth Clean Gradient */
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Radial Ambient Lighting - strictly realistic */
        body::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 80vw; height: 80vh;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* 
         * MAIN MAC-STYLE CONTAINER
         */
        .dashboard-wrapper {
            width: 100%;
            max-width: 800px;
            /* Simple fade in */
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .main-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-apple);
            padding: 48px;
            /* Inner edge highlight */
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* 
         * HEADER SECTION
         */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 260px;
            height: 80px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Vector without glow */
        .logo-box svg {
            width: 32px;
            height: 32px;
            color: #f8fafc;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        /* 
         * INFO GRID (2 Columns)
         */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .grid-card {
            background: var(--grid-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--grid-border);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: var(--transition-apple);
            cursor: default;
        }

        /* Realistic Apple-style Hover */
        .grid-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            /* Increased shadow distance mildly */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05); /* Neutral base */
            border: 1px solid rgba(255,255,255,0.05);
        }

        .icon-wrap svg { 
            width: 20px; 
            height: 20px; 
            stroke-width: 2; 
        }

        /* Muted Pastel Tints for Icons */
        .color-pink .icon-wrap svg { color: #f472b6; }
        .color-purple .icon-wrap svg { color: #a78bfa; }
        .color-blue .icon-wrap svg { color: #60a5fa; }
        .color-cyan .icon-wrap svg { color: #22d3ee; }

        /* Card Content Base */
        .card-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .value {
            font-size: 0.95rem;
            font-weight: 500; /* Medium weight instead of ultra bold */
            color: var(--text-value);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 
         * APPLE UI BUTTONS
         */
        .action-buttons {
            display: flex;
            gap: 16px;
        }

        .btn {
            flex: 1;
            padding: 14px 0;
            font-size: 0.95rem;
            font-weight: 500;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-apple);
            text-align: center;
            /* Inner top highlight common in macOS inputs */
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.15), 
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* Flat Smooth iOS/macOS gradients */
        .btn-purple { background: linear-gradient(180deg, #7c3aed 0%, #6d28d9 100%); }
        .btn-pink { background: linear-gradient(180deg, #ec4899 0%, #db2777 100%); }
        .btn-blue { background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%); }

        /* Smooth hover logic */
        .btn:hover {
            transform: scale(1.03); 
            /* Lighten the background directly */
            filter: brightness(1.1);
            box-shadow: 
                0 6px 12px rgba(0, 0, 0, 0.2), 
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
            filter: brightness(0.9);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 
         * RESPONSIVE BREAKPOINTS
         */
        @media (max-width: 768px) {
            .main-card {
                padding: 32px 24px;
            }
            .info-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 520px) {
            .action-buttons {
                flex-direction: column;
                gap: 12px;
            }
            .btn {
                padding: 16px 0;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <main class="main-card">
            
            <header class="header">
                <div class="logo-box">
                    <img src="gmiu.png" alt="Gyanmanjari Innovative University Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 12px; padding: 4px;">
                </div>
                <h1 class="title">Gyanmanjari Innovative University</h1>
            </header>

            <section class="info-grid">
                
                <!-- 1. Developer -->
                <div class="grid-card color-pink">
                    <div class="icon-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                        </svg>
                    </div>
                    <div class="card-content">
                        <span class="label">Developer</span>
                        <strong class="value">Chudasama Dishant</strong>
                    </div>
                </div>

                <!-- 2. Enrollment Number -->
                <div class="grid-card color-purple">
                    <div class="icon-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875 1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zm1.294 6.336a6.721 6.721 0 01-3.17.789 6.721 6.721 0 01-3.168-.789 3.376 3.376 0 016.338 0z" />
                        </svg>
                    </div>
                    <div class="card-content">
                        <span class="label">Enrollment No</span>
                        <strong class="value">240905091003</strong>
                    </div>
                </div>

                <!-- 3. Subject -->
                <div class="grid-card color-blue">
                    <div class="icon-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                        </svg>
                    </div>
                    <div class="card-content">
                        <span class="label">Subject</span>
                        <strong class="value" title="Cryptography and Network Security">Cryptography and Network Security</strong>
                    </div>
                </div>

                <!-- 4. Code -->
                <div class="grid-card color-cyan">
                    <div class="icon-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9.75L16.5 12l-2.25 2.25m-4.5 0L7.5 12l2.25-2.25M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
                        </svg>
                    </div>
                    <div class="card-content">
                        <span class="label">Code</span>
                        <strong class="value">BETIT16326</strong>
                    </div>
                </div>

            </section>

            <section class="action-buttons">
                <button class="btn btn-purple" onclick="window.location.href='ala1.html'">ALA 1</button>
                <button class="btn btn-pink" onclick="window.location.href='ala2.html'">ALA 2</button>
                <button class="btn btn-blue" onclick="window.location.href='ala3.html'">ALA 3</button>
            </section>

        </main>
    </div>

</body>
</html>
